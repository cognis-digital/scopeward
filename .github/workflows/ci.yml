name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q
      - name: Smoke CLI
        run: |
          export SCOPEWARD_KEY=ci-key
          scopeward sign   --scope examples/engagement.example.json --out /tmp/signed.json
          scopeward verify --scope /tmp/signed.json
          scopeward check  --scope /tmp/signed.json --module apkprobe --target android:com.acme.app --log /tmp/ev.jsonl
          scopeward audit  --log /tmp/ev.jsonl
